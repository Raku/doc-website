name: Build Current Website Container

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    # every 8 hours
    - cron: '0 0,8,16 * * *'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      QUAY_USERNAME: ${{ secrets.REGISTRY_RW_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.REGISTRY_RW_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build and push container
        run: ./scripts/cibuild.sh container
